version: '3.8'

services:
  samloc-scorekeeper:
    build:
      context: .
      args:
        - VITE_API_URL=${VITE_API_URL}
    container_name: samloc-app
    restart: unless-stopped
    environment:
      - PORT=3001
      - DATA_DIR=/data/samloc
      - NODE_ENV=production
    volumes:
      - samloc-data:/data/samloc
    networks:
      - proxy

volumes:
  samloc-data:
    driver: local

networks:
  proxy:
    external: true
